spring:
  datasource:
    url: jdbc:h2:file:./data/vibraphone;AUTO_SERVER=TRUE
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost
      - capacitor://localhost
      - http://192.168.*.*:[*]
      - http://10.*.*.*:[*]
      - http://172.*.*.*:[*]
